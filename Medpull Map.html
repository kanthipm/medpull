<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; }
        #map { flex: 3; height: 100%; }
        #sidebar {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            border-left: 1px solid #ccc;
            padding: 10px;
            background: #f8f9fa;
        }
        .sidebar-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .health-center {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #fff;
            cursor: pointer;
        }
        .health-center:hover {
            background: #e9ecef;
        }
        .highlight {
            background: #d1e7ff;
        }
        .details {
            display: none;
            margin-top: 10px;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Health Centers</title>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <div class="sidebar-header">Community Health Centers</div>
        <div id="health-center-list"></div>
    </div>

    <script>
        const API_KEY = "a80b282e59c8443b86a0e293d599595e"; 

        var map = L.map('map').setView([29.7604, -95.3698], 12); 

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var redIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
        });

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3958.8; // Radius of the Earth in miles
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return (R * c).toFixed(2);
        }

        function addMarkerAndSidebarEntry(lat, lon, name, address, hours, specializations, distance, index) {
            const listElement = document.getElementById('health-center-list');

            const marker = L.marker([lat, lon], { icon: redIcon })
                .addTo(map)
                .bindPopup(`<strong>${name}</strong><br>${address}`);

            const centerElement = document.createElement('div');
            centerElement.classList.add('health-center');
            centerElement.setAttribute('id', `health-center-${index}`);
            centerElement.innerHTML = `
                <strong>${name}</strong> (<em>${distance} miles</em>)
                <div class="details">
                    <p><strong>Address:</strong> ${address}</p>
                    <p><strong>Hours:</strong> ${hours}</p>
                    <p><strong>Specializations:</strong> ${specializations}</p>
                </div>
            `;

            centerElement.addEventListener('click', () => {
                const details = centerElement.querySelector('.details');
                const isVisible = details.style.display === 'block';
                document.querySelectorAll('.details').forEach(el => el.style.display = 'none');
                details.style.display = isVisible ? 'none' : 'block';

                listElement.querySelectorAll('.health-center').forEach(el => el.classList.remove('highlight'));
                centerElement.classList.add('highlight');
                map.setView([lat, lon], 15);
                marker.openPopup();
            });

            listElement.appendChild(centerElement);

            marker.on('click', () => {
                listElement.querySelectorAll('.health-center').forEach(el => el.classList.remove('highlight'));
                centerElement.classList.add('highlight');
                centerElement.scrollIntoView({ behavior: 'smooth', block: 'center' });

                const details = centerElement.querySelector('.details');
                document.querySelectorAll('.details').forEach(el => el.style.display = 'none'); 
                details.style.display = 'block'; 

                map.setView([lat, lon], 15);
                marker.openPopup();
            });
        }

        function fetchHealthCentersFromCSV(csvUrl) {
            fetch(csvUrl)
                .then(response => response.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            const healthCenters = results.data;
                            const baseLat = 29.7604;
                            const baseLon = -95.3698;

                            const processedCenters = healthCenters.map((center, index) => {
                                const name = center["Health Center"] || "Unknown Center";
                                const address = center.Address || "Unknown Address";
                                const hours = center["Hours of Operation"] || "No hours provided";
                                const specializations = center.Specializations || "No specializations provided";

                                return fetch(`https://api.opencagedata.com/geocode/v1/json?q=${encodeURIComponent(address)}&key=${API_KEY}`)
                                    .then(response => response.json())
                                    .then(data => {
                                        if (data.results.length > 0) {
                                            const lat = data.results[0].geometry.lat;
                                            const lon = data.results[0].geometry.lng;
                                            const distance = calculateDistance(baseLat, baseLon, lat, lon);
                                            return { lat, lon, name, address, hours, specializations, distance, index };
                                        } else {
                                            console.warn(`No geocoding results for: ${address}`);
                                            return null;
                                        }
                                    })
                                    .catch(error => {
                                        console.error(`Geocoding error for address ${address}:`, error);
                                        return null;
                                    });
                            });

                            Promise.all(processedCenters).then(results => {
                                const sortedCenters = results.filter(Boolean).sort((a, b) => a.distance - b.distance);
                                sortedCenters.forEach(center => {
                                    addMarkerAndSidebarEntry(
                                        center.lat,
                                        center.lon,
                                        center.name,
                                        center.address,
                                        center.hours,
                                        center.specializations,
                                        center.distance,
                                        center.index
                                    );
                                });
                            });
                        }
                    });
                })
                .catch(error => console.error("Error loading CSV:", error));
        }


        const csvUrl = "https://raw.githubusercontent.com/kanthipm/medpull/main/hc_data.csv";
        fetchHealthCentersFromCSV(csvUrl);
    </script>
</body>
</html>
